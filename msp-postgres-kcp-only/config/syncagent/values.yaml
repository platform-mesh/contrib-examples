# Helm values for the kcp api-syncagent — chart `kcp/api-syncagent` v0.6.0
# (repo https://kcp-dev.github.io/helm-charts, image ghcr.io/kcp-dev/api-syncagent:v0.6.0).
# Installed into namespace kcp-system on the KIND cluster by hack/syncagent-install.sh.
#
# Rendered objects (Helm release name `kcp-api-syncagent`, chart name `api-syncagent`):
#   - ServiceAccount `kcp-api-syncagent`  (fullname == release name; matched by config/syncagent/rbac.yaml)
#   - Deployment     `kcp-api-syncagent`
#
# HOW THE AGENT REACHES kcp (two hops — BOTH must resolve/connect from inside the kind pod):
#   1. Bootstrap: the agent reads Secret `kcp-kubeconfig` (key `kubeconfig`), built by
#      hack/syncagent-kubeconfig.sh to point at the provider workspace (root:msp:postgres-provider)
#      via https://host.docker.internal:<port> with insecure-skip-tls-verify.
#   2. Serving: the agent then follows the APIExportEndpointSlice `api-syncagent` in that workspace;
#      the slice's virtual-workspace URL host is whatever kcp advertises via --external-hostname
#      (owned by kcp-expert). That host MUST therefore also be host.docker.internal so the pod can
#      reach it. See the hostAliases fallback at the bottom if the pod cannot resolve the name.

# Required — the APIExportEndpointSlice the agent serves. kcp auto-creates a default
# APIExportEndpointSlice named after the APIExport, so this matches APIExport `api-syncagent`
# in the provider workspace (created by kcp-expert).
apiExportEndpointSliceName: api-syncagent

# Required — name of the Secret (with a `kubeconfig` key) holding the provider-workspace-scoped
# kcp kubeconfig. Created on the kind cluster in ns kcp-system by hack/syncagent-kubeconfig.sh.
kcpKubeconfig: kcp-kubeconfig

# Informational only (the agent's public name).
agentName: msp-postgres

# Single agent on kind: one replica, leader election off (lighter than the default 2 + election).
replicas: 1
enableLeaderElection: false

# Pin to the matched app version for reproducibility (chart appVersion is already v0.6.0).
image:
  repository: ghcr.io/kcp-dev/api-syncagent
  tag: v0.6.0

# Install the PublishedResource CRD with the chart (default; the CR is applied later by
# hack/syncagent-publish.sh, which runs after install in the Taskfile `up` sequence).
crds:
  enabled: true

# FALLBACK for kcp<->kind connectivity. The kind config (config/kind/cluster.yaml) assumes
# Docker Desktop makes `host.docker.internal` resolvable from kind pods. If that is NOT the case
# in a given CoreDNS setup, enable this and set ip to the kind docker network's host-gateway:
#   docker network inspect kind -f '{{ (index .IPAM.Config 0).Gateway }}'   # often 172.18.0.1
# hostAliases:
#   enabled: true
#   values:
#     - ip: "172.18.0.1"
#       hostnames:
#         - host.docker.internal
