# Taskfile for the msp-postgres-localsetup variant — Postgres MSP whose DATA PLANE (CloudNativePG
# + the kcp api-syncagent) runs in a SECOND kind cluster (cluster B), while the CONTROL PLANE
# (kcp + portal) is the existing Platform Mesh local-setup (cluster A). The agent connects
# OUTBOUND from B to A's kcp. This variant has NO host-binary kcp and NO kcp:* targets — kcp is
# provided by cluster A.
#
# DESIGN: this file is a THIN ORCHESTRATOR. Each target calls one script in hack/ owned by one
# expert, so multiple agents never edit this file. Owner of THIS file: `developer` (pipeline
# ordering, vars/env contract, idempotency, UX). Owners of the hack/ scripts + config/ manifests
# are noted per target.
#
# Versions (do not bump without coordinating):
#   kcp v0.31.0 (provided by cluster A / local-setup)  +  api-syncagent v0.6.0 (targets kcp 0.31)
#   +  CloudNativePG v1.29.1  +  PostgreSQL 15 (ordered Cluster image).
#
# INTEGRATION CONTRACT: the APIExport name is `postgresql.cnpg.io` (set in
# config/syncagent/values.yaml); it MUST equal the APIExport that provider-portal creates in
# cluster A's $PROVIDER_WS workspace.
#
# SHARED-STATE / SAFETY: live bring-up touches cluster A's kcp (shared by the whole local-setup)
# AND the backing kind cluster. `order`/`verify` run `kubectl ws` against $KCP_KUBECONFIG, which
# rewrites that kubeconfig's current-context server to the target workspace (standard kcp
# navigation; revert with `kubectl ws :root`). Only the integration runner executes the live
# targets. Experts author + self-validate scripts/manifests (shellcheck, yamllint, helm template,
# kubectl create --dry-run=client) WITHOUT a live stack.
#
# Every hack/ script runs under `set -euo pipefail` and reads the env vars exported below.

version: '3'

vars:
  SYNCAGENT_VERSION: "0.6.0"
  CNPG_VERSION: "1.29.1"
  KIND_CLUSTER: msp-postgres-backing
  KIND_CONTEXT: kind-msp-postgres-backing
  AGENT_NAME: msp-postgres-backing
  # Provider workspace in cluster A that holds the APIExport `postgresql.cnpg.io`.
  PROVIDER_WS: 'root:providers:postgres-provider'
  # Consumer (account) workspace in cluster A that has the auto-added APIBinding to
  # postgresql.cnpg.io. PLACEHOLDER — the integrator MUST override this to the real account path,
  # e.g.  task order CONSUMER_WS=root:orgs:<org>:<account>
  CONSUMER_WS: 'root:orgs:REPLACE-WITH-ACCOUNT'
  ORDER_NAME: pg-demo
  ORDER_NS: default
  # Cluster A's kcp reachability from inside backing-cluster pods (Docker Desktop injects this).
  KCP_EXTERNAL_HOST: host.docker.internal
  KCP_PORT: "8443"
  # Cluster A's admin kubeconfig (minted by the local-setup start.sh). Absolute path; override if
  # your helm-charts checkout lives elsewhere.
  KCP_KUBECONFIG: /Users/I073426/SAPDevelop/kow/platform-mesh/helm-charts/.secret/kcp/admin.kubeconfig

# Exported to every hack/ script. Scripts read these — do not hardcode values in scripts.
# KUBECONFIG defaults to cluster A's kcp admin kubeconfig (kcp ops use it or --kubeconfig
# "$KCP_KUBECONFIG"); BACKING-CLUSTER ops MUST be explicit: kubectl --kubeconfig "$KIND_KUBECONFIG".
env:
  KUBECONFIG: '{{.KCP_KUBECONFIG}}'
  TASKFILE_DIR: '{{.TASKFILE_DIR}}'
  KCP_KUBECONFIG: '{{.KCP_KUBECONFIG}}'
  KIND_KUBECONFIG: '{{.TASKFILE_DIR}}/.kube/kind.kubeconfig'
  SYNCAGENT_VERSION: '{{.SYNCAGENT_VERSION}}'
  CNPG_VERSION: '{{.CNPG_VERSION}}'
  KIND_CLUSTER: '{{.KIND_CLUSTER}}'
  KIND_CONTEXT: '{{.KIND_CONTEXT}}'
  AGENT_NAME: '{{.AGENT_NAME}}'
  PROVIDER_WS: '{{.PROVIDER_WS}}'
  CONSUMER_WS: '{{.CONSUMER_WS}}'
  ORDER_NAME: '{{.ORDER_NAME}}'
  ORDER_NS: '{{.ORDER_NS}}'
  KCP_EXTERNAL_HOST: '{{.KCP_EXTERNAL_HOST}}'
  KCP_PORT: '{{.KCP_PORT}}'

tasks:
  default:
    cmds: [ task --list ]
    silent: true

  # owner script: hack/tools-check.sh   (k8s-expert)
  tools:check:
    desc: "Verify required CLIs (kubectl, kind, docker, helm, kubectl-ws) and print versions"
    cmds: [ bash hack/tools-check.sh ]

  # owner script: hack/kind-up.sh + config/kind/cluster.yaml   (k8s-expert)
  kind:up:
    desc: "Create the backing kind cluster {{.KIND_CLUSTER}} (shares the default 'kind' docker network with cluster A)"
    cmds: [ bash hack/kind-up.sh ]
  kind:down:
    desc: "Delete the backing kind cluster {{.KIND_CLUSTER}}"
    cmds: [ bash hack/kind-down.sh ]

  # owner script: hack/cnpg-install.sh + config/samples/order-cluster.yaml   (postgres-expert)
  cnpg:install:
    desc: "Install CloudNativePG {{.CNPG_VERSION}} into the backing cluster and wait until ready"
    cmds: [ bash hack/cnpg-install.sh ]

  # owner scripts: hack/syncagent-*.sh + config/syncagent/*.yaml   (syncagent-expert)
  syncagent:kubeconfig:
    desc: "Derive a cluster-A provider-workspace kubeconfig & store it as a Secret in the backing cluster (needs cluster A up)"
    cmds: [ bash hack/syncagent-kubeconfig.sh ]
  syncagent:install:
    desc: "Helm-install api-syncagent {{.SYNCAGENT_VERSION}} into the backing cluster"
    cmds: [ bash hack/syncagent-install.sh ]
  syncagent:publish:
    desc: "Apply on-cluster RBAC + PublishedResource for the CNPG Cluster (+ related Secret)"
    cmds: [ bash hack/syncagent-publish.sh ]

  # owner script: hack/order.sh + config/samples/order-cluster.yaml   (postgres-expert)
  order:
    desc: "Order a Postgres 15: create Cluster {{.ORDER_NAME}} in consumer ws {{.CONSUMER_WS}} (set CONSUMER_WS first)"
    cmds: [ bash hack/order.sh ]

  # owner script: test/e2e.sh   (test-verifier)
  verify:
    desc: "End-to-end proof: pod Ready in backing cluster, status+Secret synced to cluster A, live SELECT"
    cmds: [ bash test/e2e.sh ]

  # Convenience: show live state without touching anything (safe to run any time).
  status:
    desc: "Show live state: cluster-A kubeconfig presence, backing kind cluster, CNPG + syncagent rollout"
    cmds:
      - |
        echo "=== cluster A kcp kubeconfig ($KCP_KUBECONFIG) ==="
        if [ -s "$KCP_KUBECONFIG" ]; then echo "  present"; else echo "  (missing — cluster A not stood up yet)"; fi
        echo ""
        echo "=== backing kind cluster ($KIND_CLUSTER) ==="
        if kind get clusters 2>/dev/null | grep -qx "$KIND_CLUSTER"; then
          kubectl --kubeconfig "$KIND_KUBECONFIG" get nodes 2>/dev/null
        else
          echo "  (not running)"
        fi
        echo ""
        echo "=== CloudNativePG ==="
        kubectl --kubeconfig "$KIND_KUBECONFIG" \
          -n cnpg-system get deploy/cnpg-controller-manager 2>/dev/null || echo "  (not installed)"
        echo ""
        echo "=== api-syncagent ==="
        # Helm chart sets app.kubernetes.io/name to the fullname (= release name kcp-api-syncagent).
        kubectl --kubeconfig "$KIND_KUBECONFIG" \
          -n kcp-system get deploy -l app.kubernetes.io/name=kcp-api-syncagent 2>/dev/null || echo "  (not installed)"

  down:
    desc: "Tear down the backing kind cluster (cluster A is left untouched)"
    cmds:
      - task: kind:down
