# kind cluster config for the msp-postgres-localsetup BACKING cluster (cluster B).
#
# This is the data-plane cluster: it runs CloudNativePG + the api-syncagent only. The control
# plane (kcp + portal) lives in the separate Platform Mesh local-setup cluster (cluster A); the
# agent in THIS cluster connects OUTBOUND to cluster A's kcp.
#
# Cluster name is `msp-postgres-backing` so it never collides with the standalone `msp-postgres`
# example's cluster. kind always attaches its nodes to the default `kind` Docker network, so this
# cluster shares a network with the local-setup cluster A out of the box.
#
# Pinned node image: kindest/node:v1.32.0 — the default image shipped with kind v0.31.0.
# The kindest/node images are multi-arch manifest lists; Docker Desktop on macOS arm64 will
# automatically pull the arm64 variant.
#
# Connectivity to cluster A: the api-syncagent reaches cluster A's kcp gateway (published on the
# host at 127.0.0.1:8443) under the SNI hostname root.kcp.localhost. Inside the pod that name is
# resolved via the agent's hostAliases (config/syncagent/values.yaml) to the shared `kind` network's
# host-gateway, which forwards to the host's published :8443. No per-cluster network config is
# needed here beyond sharing the default `kind` network with cluster A.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: msp-postgres-backing
nodes:
  - role: control-plane
    image: kindest/node:v1.32.0
